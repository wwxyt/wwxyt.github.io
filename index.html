<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wwxyt - GitHub Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.15);
      --green: #3fb950;
      --purple: #bc8cff;
      --orange: #f78166;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Background decoration */
    .bg-decoration {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .bg-decoration::before {
      content: '';
      position: absolute;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(88,166,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }
    .bg-decoration::after {
      content: '';
      position: absolute;
      bottom: -150px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(188,140,255,0.06) 0%, transparent 70%);
      border-radius: 50%;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
      position: relative;
      z-index: 1;
    }

    /* Header / Profile */
    .profile-header {
      text-align: center;
      padding: 48px 0 56px;
      animation: fadeInUp 0.7s ease-out;
    }

    .avatar-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 24px;
    }
    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      z-index: -1;
      opacity: 0.8;
      animation: pulse-ring 3s ease-in-out infinite;
    }
    .avatar {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      border: 3px solid var(--bg-primary);
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .avatar:hover { transform: scale(1.05); }

    .profile-name {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .profile-handle {
      font-size: 1.15rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 16px;
      font-family: 'JetBrains Mono', monospace;
    }

    .profile-bio {
      font-size: 1.05rem;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto 28px;
      line-height: 1.7;
    }

    .profile-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: var(--bg-card);
      color: var(--text-primary);
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 0.92rem;
      font-weight: 500;
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .btn-link:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(88,166,255,0.25);
    }
    .btn-link svg { flex-shrink: 0; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 48px;
      animation: fadeInUp 0.7s ease-out 0.15s both;
    }
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 20px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    /* Section */
    .section-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title svg { color: var(--accent); }

    /* Repos */
    .repos-section {
      animation: fadeInUp 0.7s ease-out 0.3s both;
    }
    .repo-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 26px;
      margin-bottom: 18px;
      transition: all 0.3s ease;
      cursor: default;
    }
    .repo-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }
    .repo-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }
    .repo-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .repo-name:hover { text-decoration: underline; }
    .repo-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid;
      flex-shrink: 0;
    }
    .badge-public {
      color: var(--green);
      border-color: rgba(63,185,80,0.3);
      background: rgba(63,185,80,0.08);
    }
    .repo-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .repo-meta {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.83rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .meta-item svg { flex-shrink: 0; opacity: 0.75; }

    /* Language dot */
    .lang-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .lang-python { background: #3572A5; }
    .lang-js { background: #f1e05a; }
    .lang-ts { background: #3178c6; }
    .lang-java { background: #b07219; }
    .lang-cpp { background: #f34b7d; }
    .lang-default { background: var(--text-muted); }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 0 20px;
      color: var(--text-muted);
      font-size: 0.82rem;
      animation: fadeInUp 0.7s ease-out 0.45s both;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-ring {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container { padding: 32px 16px; }
      .profile-name { font-size: 1.7rem; }
      .avatar { width: 96px; height: 96px; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat-number { font-size: 1.4rem; }
      .stat-card { padding: 16px 12px; }
      .repo-card { padding: 20px; }
      .repo-meta { gap: 12px; }
    }
  </style>
</head>
